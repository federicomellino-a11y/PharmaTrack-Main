kind = "web"
previewPath = "/"
title = "PharmaTrack"
version = "1.0.0"
id = "artifacts/pharmatrack"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22573

[services.development]
run = "pnpm --filter @workspace/pharmatrack run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/pharmatrack", "run", "build" ]
publicDir = "artifacts/pharmatrack/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22573"
BASE_PATH = "/"
